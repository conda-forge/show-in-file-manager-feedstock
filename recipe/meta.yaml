{% set name = "show-in-file-manager" %}
{% set version = "1.1.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 559b596e3e563800cf69d734cd236824279a9d820d1d841640c5f13e0058f9b6

build:
  skip: true  # [py<38]
  entry_points:
    - "showinfilemanager = showinfm.showinfm:main"
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
  host:
    - python
    - pip
    - tomli
    - argparse-manpage
    - setuptools
    - wheel
  run:
    - python
    - packaging
    - pyxdg  # [linux]
    - pywin32  # [win]
test:
  imports:
    - showinfm
  commands:
    - pip list
    - pip check
  requires:
    - pip

about:
  home: https://github.com/damonlynch/showinfilemanager
  license: MIT
  license_file: LICENSE
  summary: "A Python package to open the system file manager and optionally select files in it."

extra:
  recipe-maintainers:
    - JoeZiminski
